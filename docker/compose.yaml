services:
  adaptive_lio:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        ROS_DISTRO: ${ROS_DISTRO:-jazzy}
    image: adaptive-lio-ros2:${ROS_DISTRO:-jazzy}
    network_mode: host
    privileged: true
    stdin_open: true
    tty: true
    gpus: all

    environment:
      ROS_DISTRO: ${ROS_DISTRO:-jazzy}
      DISPLAY: ${DISPLAY:-:0}
      XAUTHORITY: ${XAUTHORITY:-$HOME/.Xauthority}
      QT_X11_NO_MITSHM: "1"
      XDG_RUNTIME_DIR: /tmp/runtime-root
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
      USE_TMUX: "1"
      TMUX_SESSION: adaptive_lio

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-$HOME/.Xauthority}:${XAUTHORITY:-$HOME/.Xauthority}:ro
      - ../:/root/adaptive_lio_ws/src/adaptive_lio:rw
      - ./.adaptive_lio_cache/${ROS_DISTRO:-jazzy}/build:/root/adaptive_lio_ws/build:rw
      - ./.adaptive_lio_cache/${ROS_DISTRO:-jazzy}/install:/root/adaptive_lio_ws/install:rw
      - ./.adaptive_lio_cache/${ROS_DISTRO:-jazzy}/log:/root/adaptive_lio_ws/log:rw

    command: ["bash", "-lc", "tmux new -A -s adaptive_lio"]
